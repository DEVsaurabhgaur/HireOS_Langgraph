name: Streak Keeper

on:
  schedule:
    # Runs at 18:30 UTC (00:00 IST July 13) and 06:00 UTC (11:30 IST July 13)
    - cron: "30 18 12 7 *"
    - cron: "0 6 13 7 *"
    - cron: "0 18 13 7 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  streak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "Saurabh Gaur"
          git config user.email "dev@saurabhgaur.dev"

      - name: Update streak log
        run: |
          echo "- $(date -u '+%Y-%m-%d %H:%M UTC') — automated streak maintenance" >> streak.md
          git add streak.md
          git commit -m "chore: automated streak maintenance $(date -u '+%Y-%m-%d')"
          git push
