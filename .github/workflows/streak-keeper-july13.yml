name: Streak Keeper July 13 (50 Commits)

on:
  schedule:
    # Run at 04:00 UTC (9:30 AM IST) on July 13
    - cron: "0 4 13 7 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  streak_50:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "Saurabh Gaur"
          git config user.email "saurabhgaur122000@gmail.com"

      - name: Create 50 commits
        run: |
          for i in {1..50}
          do
            echo "- Auto Commit $i/50 on $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> streak_july13.md
            git add streak_july13.md
            git commit -m "chore: automated streak keeper commit $i/50 [skip ci]"
          done
          git push origin main
