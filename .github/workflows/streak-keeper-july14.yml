name: Streak Keeper July 14 (55 Commits)

on:
  schedule:
    - cron: "0 4 14 7 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keep_streak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install pytest fastapi python-multipart
      - name: Run security and unit tests
        run: pytest tests/
